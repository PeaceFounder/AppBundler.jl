name: {{APP_NAME}}
title: {{APP_DISPLAY_NAME}}
base: core22
version: '{{APP_VERSION}}'
summary: {{APP_SUMMARY}} 
description: {{APP_DESCRIPTION}}
grade: devel
confinement: classic 

apps:
  {{APP_NAME}}:
    command: bin/{{APP_NAME}}
    desktop: meta/gui/{{APP_NAME}}.desktop
    plugs:
      - opengl
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - network

{{#JULIAIMG}}

hooks:
  configure:
    plugs:
      - network
      - opengl
      - wayland

{{/JULIAIMG}}